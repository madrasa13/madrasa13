    <!-- ড্রাইভের পিডিএফ লিংক খোলার স্ক্রিপ্ট -->
    <script>
    function goToLink(dropdown) {
        var url = dropdown.value;
        if (!url) return;
        
        var a = document.createElement('a');
        a.href = url;
        a.target = '_blank'; 
        document.body.appendChild(a);
        a.click(); 
        document.body.removeChild(a);
    }
    </script>
